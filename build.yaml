overview: "Organizes movies and TV shows into virtual folders sorted by language."
description: >
  Language Sort reads the original language and audio stream metadata of your
  movies and TV shows and presents them grouped by language, no file reorganisation
  required.  Configure pinned languages, display format (English name, native name,
  or ISO code), and whether unknown-language items are shown.
